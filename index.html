<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X-Light Catalog</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:linear-gradient(to bottom,#f4f4f4,#ffffff);
 transition:0.3s;
}

/* Header */
header{
 background:#000;
 padding:15px 25px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 position:relative;
}

header::after{
 content:"";
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 height:3px;
 background:#00b7c2;
}

header img{height:55px}
header h2{color:white;margin:0}

.filter-bar{
 text-align:center;
 padding:20px;
}

.products{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
 gap:20px;
 padding:20px;
}

.card{
 background:white;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 5px 15px rgba(0,0,0,0.08);
 cursor:pointer;
 transition:0.3s;
}

.card:hover{
 transform:translateY(-6px);
 box-shadow:0 15px 30px rgba(0,183,194,0.15);
}

.card img{
 width:100%;
 height:220px;
 object-fit:contain;
 background:#f4f4f4;
}

.card-content{
 padding:15px;
}

.price{
 color:#00b7c2;
 font-weight:bold;
 font-size:18px;
}

.badge{
 display:inline-block;
 padding:4px 8px;
 border-radius:20px;
 font-size:12px;
 margin-top:5px;
}

.in{background:#dcfce7;color:#166534}
.out{background:#fee2e2;color:#991b1b}

/* Floating Buttons */
.whatsapp{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#25D366;
 color:white;
 padding:14px 20px;
 border-radius:50px;
 text-decoration:none;
 font-weight:bold;
}

.location{
 position:fixed;
 bottom:85px;
 right:20px;
 background:#00b7c2;
 color:white;
 padding:14px 20px;
 border-radius:50px;
 text-decoration:none;
 font-weight:bold;
}

/* ===== Improved Modal ===== */

.modal{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(4px);
 justify-content:center;
 align-items:center;
 opacity:0;
 transition:opacity 0.3s ease;
}

.modal.show{
 display:flex;
 opacity:1;
}

.modal-content{
 background:white;
 width:90%;
 max-width:700px;
 padding:25px;
 border-radius:14px;
 max-height:90vh;
 overflow:auto;
 position:relative;
 transform:translateY(20px);
 transition:transform 0.3s ease;
}

.modal.show .modal-content{
 transform:translateY(0);
}

/* Bigger Close Button */
.close{
 position:absolute;
 top:15px;
 right:20px;
 font-size:32px;
 font-weight:bold;
 cursor:pointer;
 color:#444;
 transition:0.2s;
}

.close:hover{
 color:#000;
 transform:scale(1.2);
}

.variant-box{
 background:#f9fafb;
 border-radius:10px;
 padding:15px;
 margin-bottom:15px;
 box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.variant-price{
 color:#00b7c2;
 font-weight:bold;
}

.stock-in{color:#16a34a;font-weight:bold;}
.stock-out{color:#dc2626;font-weight:bold;}

</style>
</head>

<body>

<header>
<img src="logo.png">
<h2>X-Light</h2>
</header>

<div class="filter-bar">
<input type="text" id="searchInput" placeholder="Search product..."
style="padding:10px 15px;border-radius:6px;border:1px solid #ccc;width:220px;margin-right:10px;">
<select id="categoryFilter">
<option value="all">All Categories</option>
</select>
</div>

<div class="products" id="productList"></div>

<!-- Modal -->
<div id="productModal" class="modal">
 <div class="modal-content">
 <span class="close" onclick="closeModal()">×</span>
 <img id="modalImage" style="width:100%;height:300px;object-fit:contain;background:#f4f4f4;border-radius:10px;">
 <h2 id="modalTitle"></h2>
 <p id="modalCategory"></p>
 <p id="modalDescription"></p>
 <h3>Available Variants</h3>
 <div id="variantList"></div>
 </div>
</div>

<script>

/* Existing JS unchanged except modal improvements */

function openModal(productID){
 document.getElementById("productModal").classList.add("show");
 document.body.style.overflow="hidden";
}

function closeModal(){
 document.getElementById("productModal").classList.remove("show");
 document.body.style.overflow="auto";
}

/* Close on outside click */
document.getElementById("productModal").addEventListener("click",function(e){
 if(e.target.id==="productModal"){
  closeModal();
 }
});

/* Close with ESC */
document.addEventListener("keydown",function(e){
 if(e.key==="Escape"){
  closeModal();
 }
});

</script>

</body>
</html>
