<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X-Light Catalog</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:linear-gradient(to bottom,#f4f4f4,#ffffff);
}

/* Header */
header{
 background:#000;
 padding:15px 25px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 position:relative;
}

header::after{
 content:"";
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 height:3px;
 background:#00b7c2;
}

header img{height:55px}
header h2{color:white;margin:0}

.filter-bar{
 display:flex;
 justify-content:center;
 padding:30px 20px;
}

.search-wrapper{
 display:flex;
 width:100%;
 max-width:850px;
 background:#fff;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 6px 18px rgba(0,0,0,0.08);
 border:1px solid #e6e6e6;
}

.search-wrapper input{
 flex:1;
 border:none;
 padding:14px 18px;
 font-size:14px;
 outline:none;
}

.search-wrapper select{
 border:none;
 padding:0 15px;
 font-size:14px;
 outline:none;
 border-left:1px solid #eee;
 cursor:pointer;
 background:white;
}

.search-btn{
 width:65px;
 background:white;
 border:none;
 border-left:1px solid #eee;
 cursor:pointer;
 display:flex;
 align-items:center;
 justify-content:center;
}

.search-btn svg{
 width:22px;
 height:22px;
 stroke:#00b7c2;
}

.search-wrapper{
 display:flex;
 width:100%;
 max-width:850px;
 background:#fff;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 6px 18px rgba(0,0,0,0.08);
 border:1px solid #e6e6e6;
}

.search-wrapper input{
 flex:1;
 border:none;
 padding:14px 18px;
 font-size:14px;
 outline:none;
}

.search-wrapper select{
 border:none;
 padding:0 15px;
 font-size:14px;
 outline:none;
 border-left:1px solid #eee;
 cursor:pointer;
 background:white;
}

.search-btn{
 width:65px;
 background:white;
 border:none;
 border-left:1px solid #eee;
 cursor:pointer;
 display:flex;
 align-items:center;
 justify-content:center;
}

.search-btn svg{
 width:22px;
 height:22px;
 stroke:#00b7c2;
}

.products{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
 gap:20px;
 padding:20px;
}

.card{
 background:white;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 5px 15px rgba(0,0,0,0.08);
 cursor:pointer;
 transition:0.3s;
}

.card:hover{
 transform:translateY(-6px);
 box-shadow:0 15px 30px rgba(0,183,194,0.15);
}

.card img{
 width:100%;
aspect-ratio: 4 / 3;
object-fit: cover;
display:block;}

.card-content{
 padding:15px;
}

.price{
 color:#00b7c2;
 font-weight:bold;
 font-size:18px;
}

.badge{
 display:inline-block;
 padding:4px 8px;
 border-radius:20px;
 font-size:12px;
 margin-top:5px;
}

.in{background:#dcfce7;color:#166534}
.out{background:#fee2e2;color:#991b1b}

 #modalImage{
 width:100%;
 aspect-ratio: 4 / 3;
 object-fit: cover;
 border-radius:10px;
 display:block;
}
.no-results{
 text-align:center;
 font-size:18px;
 color:#777;
 padding:40px 0;
 grid-column:1/-1;
}

/* Floating Buttons */
.whatsapp{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#25D366;
 color:white;
 padding:14px 20px;
 border-radius:50px;
 text-decoration:none;
 font-weight:bold;
}

.location{
 position:fixed;
 bottom:85px;
 right:20px;
 background:#00b7c2;
 color:white;
 padding:14px 20px;
 border-radius:50px;
 text-decoration:none;
 font-weight:bold;
}

/* Modal */
.modal{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(4px);
 justify-content:center;
 align-items:center;
}

.modal.show{
 display:flex;
}

.modal-content{
 background:white;
 width:90%;
 max-width:700px;
 padding:25px;
 border-radius:14px;
 max-height:90vh;
 overflow:auto;
 position:relative;
}

.close{
 position:absolute;
 top:15px;
 right:20px;
 font-size:32px;
 font-weight:bold;
 cursor:pointer;
}

.variant-box{
 background:#f9fafb;
 border-radius:12px;
 padding:18px;
 margin-bottom:15px;
 box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.variant-top{
 display:flex;
 justify-content:space-between;
 align-items:center;
 font-weight:bold;
 font-size:18px;
 margin-bottom:8px;
}

.variant-price{
 font-weight:bold;
 color:#00b7c2;
}

.variant-bottom{
 display:flex;
 justify-content:space-between;
 align-items:center;
 font-size:14px;
 color:#555;
}

.stock-badge{
 padding:4px 10px;
 border-radius:20px;
 font-size:12px;
 font-weight:bold;
}

.stock-in{
 background:#dcfce7;
 color:#166534;
}

.stock-out{
 background:#fee2e2;
 color:#991b1b;
}

</style>
</head>
<body>

<header>
<img src="logo.png">
<h2>X-Light</h2>
</header>

<div class="filter-bar">
  <div class="search-wrapper">
    <input type="text" id="searchInput" placeholder="Search product...">
    <select id="categoryFilter"></select>
    <select id="sortSelect">
      <option value="default">Sort</option>
      <option value="priceLow">Price: Low → High</option>
      <option value="priceHigh">Price: High → Low</option>
      <option value="nameAZ">Name: A → Z</option>
    </select>
    <button class="search-btn" type="button">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="20" y1="20" x2="16.5" y2="16.5"></line>
      </svg>
    </button>
  </div>
</div>

<div class="products" id="productList"></div>

<!-- ✅ رجعنا الأزرار -->
<a class="location"
href="https://maps.app.goo.gl/22CfjLSGUL4RXMqJ8"
target="_blank">
موقعنا
</a>

<a class="whatsapp"
href="https://wa.me/201092278234"
target="_blank">
WhatsApp
</a>

<!-- Modal -->
<div id="productModal" class="modal">
 <div class="modal-content">
 <span class="close" onclick="closeModal()">×</span>
<img id="modalImage" style="background:#f4f4f4;border-radius:10px;">
<h2 id="modalTitle"></h2>
 <p id="modalCategory"></p>
 <h3>Available Variants</h3>
 <div id="variantList"></div>
 </div>
</div>

<script>

const productsURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSsp818LHJ9i4fVzl2B63EHRr-wJwcANhC9ZSUGKQn3TqgAxOjQFe4NfLNKl-sQ7Ndi1sZEzOpesx2L/pub?gid=0&single=true&output=csv";
const variantsURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSsp818LHJ9i4fVzl2B63EHRr-wJwcANhC9ZSUGKQn3TqgAxOjQFe4NfLNKl-sQ7Ndi1sZEzOpesx2L/pub?gid=365796544&single=true&output=csv";

let globalProducts=[];
let globalVariants=[];

function parseCSV(text){
 const rows=text.trim().split("\n");
 const headers=rows[0].split(",").map(h=>h.replace(/"/g,"").trim());
 return rows.slice(1).map(row=>{
  const cols=row.split(",");
  let obj={};
  headers.forEach((h,i)=>{
   obj[h]=(cols[i]||"").replace(/"/g,"").trim();
  });
  return obj;
 });
}

async function loadData(){
 globalProducts=parseCSV(await fetch(productsURL).then(r=>r.text()));
 globalVariants=parseCSV(await fetch(variantsURL).then(r=>r.text()));
 buildFilter();
 filterAndSortProducts();
}

/* ✅ مودال */
function openModal(productID){
 const product=globalProducts.find(p=>p.ProductID===productID);
 const related=globalVariants.filter(v=>v.ProductID===productID);

 document.getElementById("modalImage").src=product.Image;
 document.getElementById("modalTitle").innerText=product.Name;

 let categoryText = product.Category || "";
 if(product.Color){
  categoryText += `<br><b>Color:</b> ${product.Color}`;
 }
 document.getElementById("modalCategory").innerHTML = categoryText;
 document.getElementById("modalDescription").innerText=product.Description || "";

 const container=document.getElementById("variantList");
 container.innerHTML="";

 related.forEach(v=>{
  container.innerHTML+=`
   <div class="variant-box">
     <div class="variant-top">
       <div>${v.Watt}</div>
       <div class="variant-price">${v.Price} EGP</div>
     </div>
     <div class="variant-bottom">
       <div>Size: ${v.Dimension}</div>
       <div class="stock-badge ${v.Stock==='In Stock'?'stock-in':'stock-out'}">
         ${v.Stock}
       </div>
     </div>
   </div>
  `;
 });

 document.getElementById("productModal").classList.add("show");
}

function closeModal(){
 document.getElementById("productModal").classList.remove("show");
}

document.getElementById("productModal").addEventListener("click", function(e){
 if(e.target.id==="productModal") closeModal();
});

document.addEventListener("keydown", function(e){
 if(e.key==="Escape") closeModal();
});

/* ✅ Filter + Sort */
function buildFilter(){
 const select=document.getElementById("categoryFilter");
 select.innerHTML='<option value="all">All Categories</option>';
 const categories=[...new Set(globalProducts.map(p=>p.Category).filter(Boolean))];
 categories.forEach(cat=>{
  const option=document.createElement("option");
  option.value=cat;
  option.textContent=cat;
  select.appendChild(option);
 });

 select.addEventListener("change",filterAndSortProducts);
 document.getElementById("searchInput").addEventListener("input",filterAndSortProducts);
 document.getElementById("sortSelect").addEventListener("change",filterAndSortProducts);
}

function filterAndSortProducts(){
 const searchValue=document.getElementById("searchInput").value.toLowerCase();
 const selectedCategory=document.getElementById("categoryFilter").value;
 const sortValue=document.getElementById("sortSelect").value;

 let filtered=globalProducts.filter(p=>{
  const text=(p.Name+" "+(p.Category||"")).toLowerCase();
  return (selectedCategory==="all" || p.Category===selectedCategory) && text.includes(searchValue);
 });

 if(sortValue==="priceLow"){
  filtered.sort((a,b)=>{
   const pa=parseFloat(globalVariants.find(v=>v.ProductID===a.ProductID)?.Price||0);
   const pb=parseFloat(globalVariants.find(v=>v.ProductID===b.ProductID)?.Price||0);
   return pa-pb;
  });
 }

 if(sortValue==="priceHigh"){
  filtered.sort((a,b)=>{
   const pa=parseFloat(globalVariants.find(v=>v.ProductID===a.ProductID)?.Price||0);
   const pb=parseFloat(globalVariants.find(v=>v.ProductID===b.ProductID)?.Price||0);
   return pb-pa;
  });
 }

 if(sortValue==="nameAZ"){
  filtered.sort((a,b)=>a.Name.localeCompare(b.Name));
 }

 renderProducts(filtered);
}

function renderProducts(products){
 const container=document.getElementById("productList");
 container.innerHTML="";

 if(products.length===0){
  container.innerHTML='<div class="no-results">No products found</div>';
  return;
 }

 products.forEach(p=>{
  const related=globalVariants.filter(v=>v.ProductID===p.ProductID);
  const anyInStock=related.some(v=>v.Stock==="In Stock");

  const card=document.createElement("div");
  card.className="card";
  card.onclick=()=>openModal(p.ProductID);

  card.innerHTML=`
   <img src="${p.Image}" loading="lazy">
   <div class="card-content">
    <h3>${p.Name}</h3>
    <p>${p.Category||""}</p>
    ${related.length?`<p class="price">${related[0].Price} EGP</p>`:""}
    ${related.length?`<span class="badge ${anyInStock?'in':'out'}">${anyInStock?'In Stock':'Out of Stock'}</span>`:""}
   </div>
  `;
  container.appendChild(card);
 });
}

loadData();

</script>
</body>
</html>
