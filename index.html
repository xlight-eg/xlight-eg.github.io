<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X-Light Catalog</title>
<style>
body{
 margin:0;
 font-family:Arial;
 background:linear-gradient(to bottom,#f4f4f4,#ffffff);
}

/* Header */
header{
 background:#000;
 padding:15px 25px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 position:relative;
}

header::after{
 content:"";
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 height:3px;
 background:#00b7c2;
}

header img{height:55px}
header h2{color:white;margin:0}

.filter-bar{
 text-align:center;
 padding:20px;
}

.products{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
 gap:20px;
 padding:20px;
}

.card{
 background:white;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 5px 15px rgba(0,0,0,0.08);
 cursor:pointer;
 transition:0.3s;
}

.card:hover{
 transform:translateY(-6px);
 box-shadow:0 15px 30px rgba(0,183,194,0.15);
}

.card img{
 width:100%;
 height:220px;
 object-fit:contain;
 background:#f4f4f4;
}

.card-content{
 padding:15px;
}

.price{
 color:#00b7c2;
 font-weight:bold;
 font-size:18px;
}

.badge{
 display:inline-block;
 padding:4px 8px;
 border-radius:20px;
 font-size:12px;
 margin-top:5px;
}

.in{background:#dcfce7;color:#166534}
.out{background:#fee2e2;color:#991b1b}

/* No results message */
.no-results{
 text-align:center;
 font-size:18px;
 color:#777;
 padding:40px 0;
 grid-column:1/-1;
}

.whatsapp{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#25D366;
 color:white;
 padding:14px 20px;
 border-radius:50px;
 text-decoration:none;
 font-weight:bold;
}

.location{
 position:fixed;
 bottom:85px;
 right:20px;
 background:#00b7c2;
 color:white;
 padding:14px 20px;
 border-radius:50px;
 text-decoration:none;
 font-weight:bold;
}

/* Modal */
.modal{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(4px);
 justify-content:center;
 align-items:center;
}

.modal.show{
 display:flex;
}

.modal-content{
 background:white;
 width:90%;
 max-width:700px;
 padding:25px;
 border-radius:14px;
 max-height:90vh;
 overflow:auto;
 position:relative;
}

.close{
 position:absolute;
 top:15px;
 right:20px;
 font-size:32px;
 font-weight:bold;
 cursor:pointer;
}

/* Variant */
.variant-box{
 background:#f9fafb;
 border-radius:12px;
 padding:18px;
 margin-bottom:15px;
 box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.variant-top{
 display:flex;
 justify-content:space-between;
 align-items:center;
 font-weight:bold;
 font-size:18px;
 margin-bottom:8px;
}

.variant-price{
 font-weight:bold;
 color:#00b7c2;
}

.variant-bottom{
 display:flex;
 justify-content:space-between;
 align-items:center;
 font-size:14px;
 color:#555;
}

.stock-badge{
 padding:4px 10px;
 border-radius:20px;
 font-size:12px;
 font-weight:bold;
}

.stock-in{
 background:#dcfce7;
 color:#166534;
}

.stock-out{
 background:#fee2e2;
 color:#991b1b;
}

</style>
</head>
<body>

<header>
<img src="logo.png">
<h2>X-Light</h2>
</header>

<div class="filter-bar">
<input type="text" id="searchInput" placeholder="Search product..."
style="padding:10px 15px;border-radius:6px;border:1px solid #ccc;width:220px;margin-right:10px;">
<select id="categoryFilter">
<option value="all">All Categories</option>
</select>
</div>

<div class="products" id="productList"></div>

<a class="location"
href="https://maps.app.goo.gl/22CfjLSGUL4RXMqJ8"
target="_blank">
موقعنا
</a>

<a class="whatsapp"
href="https://wa.me/201092278234"
target="_blank">
WhatsApp
</a>

<div id="productModal" class="modal">
 <div class="modal-content">
 <span class="close" onclick="closeModal()">×</span>
 <img id="modalImage" style="width:100%;height:300px;object-fit:contain;background:#f4f4f4;border-radius:10px;">
 <h2 id="modalTitle"></h2>
 <p id="modalCategory"></p>
 <p id="modalDescription"></p>
 <h3>Available Variants</h3>
 <div id="variantList"></div>
 </div>
</div>

<script>

const productsURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSsp818LHJ9i4fVzl2B63EHRr-wJwcANhC9ZSUGKQn3TqgAxOjQFe4NfLNKl-sQ7Ndi1sZEzOpesx2L/pub?gid=0&single=true&output=csv";
const variantsURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSsp818LHJ9i4fVzl2B63EHRr-wJwcANhC9ZSUGKQn3TqgAxOjQFe4NfLNKl-sQ7Ndi1sZEzOpesx2L/pub?gid=365796544&single=true&output=csv";

function parseCSV(text){
 const rows=text.trim().split("\n");
 const headers=rows[0].split(",").map(h=>h.replace(/"/g,"").trim());
 return rows.slice(1).map(row=>{
  const cols=row.split(",");
  let obj={};
  headers.forEach((h,i)=>{
   obj[h]=(cols[i]||"").replace(/"/g,"").trim();
  });
  return obj;
 });
}

let globalProducts=[];
let globalVariants=[];

async function loadData(){
 globalProducts=parseCSV(await fetch(productsURL).then(r=>r.text()));
 globalVariants=parseCSV(await fetch(variantsURL).then(r=>r.text()));
 renderProducts();
 buildFilter();
}

function renderProducts(){
 const container=document.getElementById("productList");
 container.innerHTML="";
 globalProducts.forEach(p=>{
  if(!p.ProductID) return;
  const related=globalVariants.filter(v=>v.ProductID===p.ProductID);
  const anyInStock=related.some(v=>v.Stock==="In Stock");

  const card=document.createElement("div");
  card.className="card";
  card.setAttribute("data-category",p.Category || "");
  card.onclick=()=>openModal(p.ProductID);

  card.innerHTML=`
   <img src="${p.Image}" loading="lazy" onerror="this.src='https://via.placeholder.com/400'">
   <div class="card-content">
    <h3>${p.Name}</h3>
    <p>${p.Category || ""}</p>
    ${related.length?`<p class="price">${related[0].Price} EGP</p>`:""}
    ${related.length?`<span class="badge ${anyInStock?'in':'out'}">${anyInStock?'In Stock':'Out of Stock'}</span>`:""}
   </div>
  `;
  container.appendChild(card);
 });
}

function buildFilter(){
 const select=document.getElementById("categoryFilter");
 select.innerHTML='<option value="all">All Categories</option>';

 const categoryCount={};

 globalProducts.forEach(p=>{
  if(!p.Category) return;
  categoryCount[p.Category]=(categoryCount[p.Category]||0)+1;
 });

 Object.keys(categoryCount).forEach(cat=>{
  const option=document.createElement("option");
  option.value=cat;
  option.textContent=`${cat} (${categoryCount[cat]})`;
  select.appendChild(option);
 });

 select.addEventListener("change",filterProducts);
 document.getElementById("searchInput").addEventListener("input",filterProducts);
}

function filterProducts(){
 const searchValue=document.getElementById("searchInput").value.toLowerCase();
 const selectedCategory=document.getElementById("categoryFilter").value;
 const cards=document.querySelectorAll(".card");
 let visibleCount=0;

 cards.forEach(card=>{
  const text=card.innerText.toLowerCase();
  const categoryMatch=(selectedCategory==="all" || card.getAttribute("data-category")===selectedCategory);
  const searchMatch=text.includes(searchValue);
  const visible=(categoryMatch && searchMatch);
  card.style.display=visible?"block":"none";
  if(visible) visibleCount++;
 });

 const container=document.getElementById("productList");

 if(visibleCount===0){
  if(!document.querySelector(".no-results")){
   const msg=document.createElement("div");
   msg.className="no-results";
   msg.textContent="No products found";
   container.appendChild(msg);
  }
 }else{
  const existing=document.querySelector(".no-results");
  if(existing) existing.remove();
 }
}

/* Modal close */
function closeModal(){
 document.getElementById("productModal").classList.remove("show");
}

document.getElementById("productModal").addEventListener("click",function(e){
 if(e.target.id==="productModal"){
  closeModal();
 }
});

document.addEventListener("keydown",function(e){
 if(e.key==="Escape"){
  closeModal();
 }
});

loadData();

</script>
</body>
</html>
