<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Location</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #111;
    color: #fff;
    text-align: center;
}

.location-section {
    padding: 60px 20px;
}

.location-section h2 {
    font-size: 28px;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

.location-section p {
    color: #ccc;
    margin-bottom: 30px;
}

.map-container {
    max-width: 1000px;
    margin: auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

iframe {
    width: 100%;
    height: 400px;
    border: 0;
}

.map-button {
    display: inline-block;
    margin-top: 30px;
    padding: 14px 28px;
    background: linear-gradient(45deg, #000, #333);
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s ease;
    font-size: 15px;
    letter-spacing: 0.5px;
}

.map-button:hover {
    background: linear-gradient(45deg, #444, #000);
    transform: translateY(-2px);
}
</style>
</head>

<body>

<section class="location-section">
    <h2>📍 Our Location</h2>
    <p>X_light Magnetic Track<br>
    اللوتس الجنوبيه، محافظة القاهرة 71631</p>

    <div class="map-container">
        <iframe
            src="https://www.google.com/maps?q=X_light+magnetic_track,+اللوتس+الجنوبيه,+محافظة+القاهرة+71631&output=embed"
            loading="lazy"
            allowfullscreen>
        </iframe>
    </div>

    <a class="map-button"
       href="https://www.google.com/maps/search/?api=1&query=X_light+magnetic_track,+اللوتس+الجنوبيه,+محافظة+القاهرة+71631"
       target="_blank">
       Open in Google Maps
    </a>
</section>

</body>
</html>
