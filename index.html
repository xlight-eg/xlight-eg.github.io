<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X-Light Catalog</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:linear-gradient(to bottom,#f4f4f4,#ffffff);
 transition:0.3s;
}

/* Header */
header{
 background:#000;
 padding:15px 25px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 position:relative;
}

header::after{
 content:"";
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 height:3px;
 background:#00b7c2;
}

header img{height:55px}
header h2{color:white;margin:0}

.filter-bar{
 text-align:center;
 padding:20px;
}

.products{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
 gap:20px;
 padding:20px;
}

.card{
 background:white;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 5px 15px rgba(0,0,0,0.08);
 cursor:pointer;
 transition:0.3s;
}

.card:hover{
 transform:translateY(-6px);
 box-shadow:0 15px 30px rgba(0,183,194,0.15);
}

.card img{
 width:100%;
 height:220px;
 object-fit:contain;
 background:#f4f4f4;
}

.card-content{
 padding:15px;
}

.price{
 color:#00b7c2;
 font-weight:bold;
 font-size:18px;
}

.badge{
 display:inline-block;
 padding:4px 8px;
 border-radius:20px;
 font-size:12px;
 margin-top:5px;
}

.in{background:#dcfce7;color:#166534}
.out{background:#fee2e2;color:#991b1b}

/* Floating Buttons */
.whatsapp{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#25D366;
 color:white;
 padding:14px 20px;
 border-radius:50px;
 text-decoration:none;
 font-weight:bold;
}

.location{
 position:fixed;
 bottom:85px;
 right:20px;
 background:#00b7c2;
